body:
  text: 元載孔升天音第一元載孔升天中有自然之書八字文曰刀利禪猷婆泥咎通天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成孔升天中大梵隱語無量之音以付道君使教孔升天中宿有仙名者度應得道人也元載忉恱境利浮爓洞陽禪享苦生界猷命化南宫婆耶有錬池泥津飾雕容咎醜遏生源通勃肆鼓洋天真皇人曰其章以孔升天中合五方飛玄之氣以和八字自然之音曰無量洞章孔升天去皇崖天九百萬氣元者元之始載梵行之氣以成孔升之天刀利者南無際世界之號禪是刀利之國生存其國則為苦生無善之根其界上有洞陽之宫浮爓為流火之庭熒飾光芒靈文既明刀利國土改為福德之堂苦生之魂皆得度入洞陽之宫猷是南上好生君內名也婆泥則錬池之靈童也苦生之人得度洞陽之宫皆詣錬池受靈童之錬而更生福德之世咎通刀利世界之魔神常遏人生生之路人知好生君名詣靈童而受錬魔神即奉之焉學得八字之音則刀利之境無極靈官侍衛其身而造南霍則仙人伺迎三年必能䇿丹霄之輪上升三氣之天也太安皇崖天音第二太安皇崖天中有自然之書八字文曰宛藪滌色太眇之堂天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成皇崖天中大梵隱語無量之音以付道君使教皇崖天中宿有仙名者度應得道人也太安宛太漠藪遙但赤明滌蕩塵滓氛色界大羅青太漠導真科眇邈空洞經之歷飛天誡堂堂更化生天真皇人曰其章以皇崖天中合五方飛玄之氣以和八字自然之音曰無量洞章皇崖天去極風天八百萬氣太者虛之名以安皇崖之天天有帝王監名宛藪而開太漠之徑以明八字之文明道既彰大羅之上鬱然澄清滌色者是色界上飛天真人也常乘景雲之車駕九色之龍遊乎三界之上出入玉清之中蕩除塵滓之氣開度善根之人太眇為空洞之化結自然之章理明道以教導勸度於萬生學見八字之音洞知天中之名飛天降致景雲之車載兆上升化生之臺也顯定極風天音第三顯定極風天中有自然之書八字文曰流羅梵萌景蔚蕭嵎天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成極風天中大梵隱語無量之音以付道君使教皇崖天中宿有仙名者度應得道人也極風流元景羅暉曜九玄梵綱回天劫萌邃固玉根景行歷長夜蔚秀落華年蕭仭空中立嵎上對清賔天真皇人曰其章以極風天中合五方飛玄之氣以和八字自然之音曰無量洞章極風天去孝芒天七百萬氣極風洞極之氣綱維八貟而成天也天立而八字明焉流者天王之內名處乎紫霄之上遊觀玉京之山羅者月女之諱流暉極風之天洞照九玄之貟梵則飛天之人萌則元始之神飛天則回九天之關大神則固極風之根景皇四上真人蕭蔚亦是景霄仙人並治玉京之臺常乘三色之雲歷校長夜之中料生死於簡籍開度善根之魂萬劫長對並係之焉若修靈文於洞章則仰披九玄之房乃得駕三色之雲上升景皇之羣拔九幽之魂死骸更生法輪之門始皇孝芒天音第四始皇孝芒天中有自然之書八字文曰易邈無寂宛首少都天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成孝芒天中大梵隱語無量之音以付道君使教孝芒天中宿有仙名者度應得道人也始皇易有氣邈哉何𡪹𡪹無形空中有寂庭秀玉標宛覺摩羅真首負三素飊少童翼朱日都圎煥幽𡪹天真皇人曰其章以孝芒天中合五方飛玄之氣以和八字自然之音曰無量洞章孝芒天去浮容天六百萬氣始皇天中大梵始行之氣以綱維孝芒之天天中有天王號曰易邈從龍漢而來赤明而出在始開之中故曰𡪹𡪹在虛無之內處乎寂寂之庭神景玉秀為萬道之標宛首者太上道君之號道君駕乘八景玉輿䇿三素之雲開元始之玄奧演大法以度人少都是日中靈童名也恆散日精以濯真流飛華以拂靈披長夜之户明九幽之房學聞天中之音則洞天中之名天王下飛景之輿降三素之軿度身三界之上進入寂寂之庭也太皇翁重浮容天音第五太皇翁重浮容天中有自然之書八字文曰阿繿都竺華漠延由天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成翁重天中大梵隱語無量之音以付道君使教翁重天中宿有仙名者度應得道人也太黃阿雲樓繿波霄上吟郁默遏玄路竺額歌謡音華界多欲門漠漠不可尋延演億萬衆由庭成鬼林天真皇人曰其章以浮容天中合五方飛玄之氣以和八字自然之音曰無量洞章浮容天去江由天五百萬氣太皇中元之氣梵太漠之綱以成翁重天天有九層之樓結雲氣而峩峩阿繿者則天王之隱名常乘景霄之輪遊觀九層之阿處玉樓之上上鳴洞章以召魔王上為真仙之館下為鬼神之家郁默者為天中魔王之隱名竺額則是魔王之都伯也恆在欲界之上誦詠空洞之歌延演則是束鬼之庭由者則為禁鬼之房天王上登雲樓之上吟誦無量之章則天魔應響而來羣鬼詣由而伏形真人常佩八字而飛空誦無量而登玉清竊其音則洞徹盻其篇則洞靈奉之者則九祖開泰修之者則死骸而更生也無思江由天音第六無思江由天中有自然之書八字文曰九開自辨阿那品首天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成江由天中大梵隱語無量之音以付道君使教江由天中宿有仙名者度應得道人也九玄乘運明開清長夜宫自以靈運會辨集大化通阿丘超龍嶺那耶翼三房度品飛天衆首化以成童天真皇人曰其章以江由天中合五方飛玄之氣以和八字自然之音曰無量洞章江由天去阮樂天四百萬氣九開大衍之數天地未光有九分之關轉輪三氣九度明焉江由天氣於是而立九五列位開定隂陽法化流演萬品受生阿丘天王之內名常乘九色之龍駕三素之軿上登龍山之巔遊觀九玄之中那耶者飛天神人之隱諱飛行三界之上歷披長夜之宫開九幽之房拔度善人之魂有明八字之音誦詠無量之章則九祖得出長夜之府幽魂更生朱陵之宫可謂朽木生華死骸還童長修不怠則飛天齊功也上揲阮樂天音第七上揲阮樂天中有自然之書八字文曰無量扶蓋浮羅合神天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成阮樂天中大梵隱語無量之音以付道君使教阮樂天中宿有仙名者度應得道人也阮樂無為始量度飛天人扶曦通幽夜蓋慶流上玄浮爽乘運歸羅界開大千合慶更生賔神公定命年天真皇人曰其章以阮樂天中合五方飛玄之氣以和八字自然之音曰無量洞章阮樂天去曇誓天三百萬氣阮樂天中有無量品大聖衆無量則大衆之始神也總統飛天之人皆受其品量而得遷升也扶曦者則更生真人內名常校幽夜之録簡善惡之根善者受其開度惡者極其對根蓋者玄中之福堂大號也幽夜之魂受真人開度謂之浮乘運而歸上升福堂羅者大羅也而開大千世界間合更生之賔上詣大羅之天神公是大羅天之丞相為受更生之賔定命籍於朱宫削死根於三官也學知八字之音則九祖受福於真人拔幽夜之萬劫受更生於神公也無極曇誓天音第八無極曇誓天中有自然之書八字文曰玉誕長桑柏空度仙天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成曇誓天中大梵隱語無量之音以付道君使教曇誓天中宿有仙名者度應得道人也曇誓玉都上誕騫秀東華長條班紫洞桑林翠碧霞柏卉和神風空生自然歌度人三界庭仙堂養雲芽天真皇人曰其章以曇誓天中合五方飛玄之氣以和八字自然之音曰無量洞章曇誓天去霄度天二百萬氣玉誕者曇誓天中都名也上有騫林之樹覆蔭東華之宫騫林之葉有大洞之章紫書玉字煥乎上清下有扶桑之樹上森騫林之叢碧雞鳴其蓋青霞翠其峯神風流返香之草以鼓桑林百籟之音神風一詠空生洞章度仙者曇誓天中飛天神人也常以雞鳴之始上登玉臺之上仙堂之中取五方雲芽之精仰咽日月三晨之光常簡學仙之人生死録籍開度九幽之魂升入法輪之門學知此法則能䇿神風以飛煙上升騫林之叢七祖則出長夜之府上登更生之宫也元始天尊告太上道君曰赤明始開其八天之氣分度並屬西方素天天有八字合六十四音皆天中大梵隱語無量之音行七氣天君之道當佩其音誦其章出入遊行常當叩齒七通思白虎師子導引左右素雲三重覆匝身形密呪曰七氣金靈八天尊神白虎䇿輦師子捧轅七氣纏綿鍊我成仙身發金光肺映素雲內外變化升入洞門七祖出夜九幽放魂三塗五苦長斬惡根同歡福舍受慶自然億劫開度隨運長存畢引氣七咽止行七年八天各以太素玉女玉童各八人侍衛身形降致太素七氣之薰留年住世萬劫童顔慶及七祖升度南宫返胎更生世世王門大乘妙道普度天人勤為用心勿忘我言道君稽首奉受命旨皓庭霄度天音第一皓庭霄度天中有自然之書八字文曰玃無自育九日導乾天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成霄度天中大梵隱語無量之音以付道君使教霄度天中宿有仙名者度應得道人也霄度玃靈運無量洞得真自抗不終劫育生保長年九會應玄機日童披夜還導蕩長夜戶乾門鍊五仙天真皇人曰其章以霄度天中合五方飛玄之氣以和八字自然之音曰無量洞章霄度天去元洞天九萬九千氣霄度是元始始開之氣溟涬無色之中玃無是龍漢之天飛天神人也元始始開之際玃無乘運而出凝自然之精而立霄度天焉故曰無量而得真也霄度既立而自抗不終天劫育者霄度天王之內名常駕象輪之車遊行九玄之門轉九機之度以應劫會之期天運之終而日童停光拔度學者之人灌以水母之精導以太和之氣攝召長夜之魂得出九幽之户皆上詣天門受鍊五神進升朱陵之宫受福祿於天堂逍遙無為永居自然也淵通元洞天音第二淵通元洞天中有自然之書八字文曰坤毋東覆形攝上玄天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成元洞天中大梵隱語無量之音以付道君使教元洞天中宿有仙名者度應得道人也元洞坤幽户毋宫運地關東河受靈會覆山繞長源形居無窮氣攝鳥對帝君上選皇生録玄圖記仙人天真皇人曰其章以元洞天中合五方飛玄之氣以和八字自然之音曰無量洞章元洞天去妙成天八萬八千氣淵通者通元之氣氣凝而成元洞天也坤毋者太隂都候九靈之毋治在東海扶桑暘谷之淵常總地機輪轉元氣上應天關天關轉地機動周天一度水則涌三千三百度九江涌溢水則彌天東海受會制期河源覆山水神也治於須彌之山以山鎮固於巨海遏斷於長源則地機而不淪保劫而長存會之欲交而坤毋出東海之上攝召鳥毋鳥毋則水之候神上詣帝君而申劫會以度學仙之人上選者上帝司命也水欲出而司命科校學仙人名上言玄都之宫有知八字之音大水出時則鳥毋迎以鳳車上登須彌之山倐歘之間而天地都清矣太文翰寵妙成天音第三太文翰寵妙成天中有自然之書八字文曰陀羅育邈眇氣合雲天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成妙成天中大梵隱語無量之音以付道君使教妙成天中宿有仙名者度應得道人也妙成阿陀嶺羅暉曜玉階育生部十部邈匡三界畿眇眇行上雲氣結成羽衣合景北靈館雲上携手飛天真皇人曰其章以妙成天中合五方飛玄之氣以和八字自然之音曰無量洞章妙成天去禁上天七萬七千氣妙成以龍漢洞玄之氣赤明開運其氣於空洞之中與五篇真文結氣俱明元始號妙成之天陀者天帝之內名與妙成俱生在雲阿之嶺羅者是月妃之內名陀在雲嶺之上抱月而明也妙成立而有天中神字曰育生總統十方飛天之神也邈是天中神王羽林監神王常使匡御三界之上以簡人生死之籍主魔王保舉得道之人得魔王保度上詣羽林監受符以升天眇眇行雲宫之中羽林結雲氣以成衣身衣結雲之衣遙入朱陵之宫而受福於天宫則與飛天合景雲上而飛也學知天中之音則三界所稱也地祇奉迎洞明鬼神而坐知自然三十二年則能駕空飛行三界遊乎上清七祖即得開出長夜度身朱宫逍遙無為衣食自然也太素秀樂禁上天音第四太素秀樂禁上天中有自然之書八字文曰飛天大醜總監上天天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成禁上天中大梵隱語無量之音以付道君使教禁上天中宿有仙名者度應得道人也秀樂飛空經天人誦靈書大隗妙法羅醜伯促運除總攝八會氣監度長夜軀上受南宫食天賔同福廬天真皇人曰其章以禁上天中合五方飛玄之氣以和八字自然之音曰無量洞章禁上天去常融天六萬六千氣秀樂者則禁上天飛玄之氣而結成空洞之經以度禁上天人飛天者是十方飛天神王也常在飛玄之上而誦空洞之經以和自然之氣拔度學道之人大隗則三界之都録主生死之圖籍醜伯則是三界之魔王常受事於大隗學識其音則享福不知其音則被殃故得魔王保舉而身升三清也總是飛天都統之官常攝八會之氣以促天地之運氣監則天王之監領長夜之宫校學道簿録開度九幽之魂學知天中之音則天王之監列言大隗勤録仙簿得為真人九祖父毋即出長夜上升南宫逍遙歡樂與飛天同賔也太虛無上常融天音第五太虛無上常融天中有自然之書八字文曰沙陀劫量龍漢瑛鮮天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成常融天中大梵隱語無量之音以付道君使教常融天中宿有仙名者度應得道人也常融沙蘭宫陀丘巨億人劫運改大羅量度飛天真龍為無崖固得道難可新瑛勃保靈運鮮童歡長年天真皇人曰其章以常融天中合五方飛玄之氣以和八字自然之音曰無量洞章常融天去騰勝天中五萬五千氣常融天是無上洞極之氣而結成天天中有沙蘭之宫是紫微之別館處乎玉清之上煥乎紫虛之中中有陀丘之衆巨億萬人陀丘者是新得度受靈之人也功德未備故散處其中劫運一交則陀丘之衆計功之重而得升度朱陵之宫受福而仙也龍者龍漢之時道始純朴徒有其化難可為新瑛勃者龍漢之時飛天神人也常開度九幽之魂度蘭宫之中鮮者南宫之童學人得度而鮮童錬其形容度於朱陵之上受福於歡樂之堂也太釋玉隆騰勝天音第六太釋玉隆騰勝天中有自然之書八字文曰碧落浮黎空歌保珍天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成騰勝天中大梵隱語無量之音以付道君使教騰勝天中宿有仙名者度應得道人也騰勝碧重雲落羅曜上玄浮空禮七寶黎度慶玉文空嘯詠靈風歌章歡天賔保此不終劫珍我自然篇天真皇人曰其章以騰勝天中合五方飛玄之氣以和八字自然之音曰無量洞章騰勝天去梵度天四萬四千氣騰勝者赤明九鍊之氣以成騰勝之天天中常生碧霞之雲氣以蔭騰勝之天落者雲中飛天之神常乘碧霞之輦遊於騰勝之天一日三時引天中之衆聖上朝七寶之宫浮黎天王之內名象聖上朝而天王稱慶焉空者天中之侍宸嘯而靈風聚煙靈風既鼓音成洞章學知八字則明天音七祖去離九幽之府上升南宫為飛天之賔保此不終之劫珍其自然之功既入無為之堂而保我至真之篇也龍變梵度天音第七龍變梵度天中有自然之書八字文曰惡奕無品洞妙自真天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成梵度天中大梵隱語無量之音以付道君使教梵度天中宿有仙名者度應得道人也梵度惡緣界奕奕升靈門無中拔長夜品量九幽魂洞明宿對根妙覺有始端自入歡樂舍合真齊仙羣天真皇人曰其章以梵度天中合五方飛玄之氣以和八字自然之音曰無量洞章梵度天去賈奕天三萬三千氣梵度天從龍漢後一劫而受龍變之號結大梵之氣而成天焉惡奕者天王之內名住於龍漢之中諸緣並盡而得過度三界之庭升入太虛之館受九仙之鍊而得進登大聖之號赤明開運元始鍚為梵度天王故奕奕而升靈門也無者太元真人受天王之符而度長夜之魂品量功德之録斷絶宿命之根受度之魂既去九幽之對而得度妙化之堂便識宿命其有始端思緣並盡逍遙歡樂之舍與飛天而合真也太極平育賈奕天音第八太極平育賈奕天中有自然之書八字文曰元梵恢漠幽寂度人天真皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成賈奕天中大梵隱語無量之音以付道君使教賈奕天中宿有仙名者度應得道人也太極元始氣梵行大羅青恢廓洞崖上漠漠無象形幽中有妙真寂中自生精度我六梵行人化三界庭天真皇人曰其章以賈奕天中合五方飛玄之氣以和八字自然之音曰無量洞章賈奕天去梵行天二萬二千氣太極者無數之極而登六羅之上號賈奕天元梵則元始風澤之氣抗舉澄漢之精髙而洞浮懸而不落恢漠者逺而無礙有而若無微不可名妙不可尋幽兮寂兮其中有真真中生精度學者之身六梵之行人如六梵而即化形逍遙三界之上遊乎大羅之青名入賈奕天録九祖並度大羅之宫受福於七寶林也元始天尊告太上道君曰大運啓期赤明始開其八天之氣分度並屬北方玄天天有八字合六十四音皆天中大梵隱語無量之音行五氣天君之道當佩其音誦其章出入遊行常當叩齒五通思飛龜羽蓋蓊鬱左右玄雲三重覆匝身形神童玉女羽衣飛裳侍衛前後密呪曰玄天徘徊流景上清大有啓運八字髙明飛玄澄虛洞音自生五氣纏綿灌我身形冠帶北單受鍊洞靈腎府化仙內水光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寶林中返胎更形長夜滅死南宫記名黃籙白簡世世生仙畢引氣五咽止行之五年八天各以太玄玉童玉女五人侍衛身形降致玄滋五氣之精停年留劫保命三清七祖同慶世世生仙其法髙妙深寶勿輕道君稽首奉受命旨天真皇人稽首上白天尊自受日月隨運流遷去來轉輪一光一冥一滅一度一死一生身受破壞一敗一成經履天地改易光明幽幽眇邈非可思議自龍漢以來已九萬九千九百萬重劫緣對相牽世世不絶至于今日亦嘗生王門亦嘗生賤家亦嘗生富室亦嘗生窮寒亦嘗生人尊亦嘗為僕使亦嘗嬰六疾亦嘗受光明亦嘗受智慧亦嘗受愚聾諸行備經身未泰定惡對緣生而作無道非人所行不敬天地不畏鬼神不慈不孝傷害衆生死循劒樹足踐刀山或入寒夜或入鑊湯流曳三塗五苦之中形魂楚撻痛毒備嬰萬劫對苦乃得還生六畜之中年命無幾更受死壞方復還充五嶽長徒東嶽作役無所不更千劫受苦乃得還生邊夷之中雖有人形而無人情年命無幾身復死壞魂逝四瀆漣汲溟波塗炭寒冰晝夜無寧百劫對盡乃得還生賤人之中六疾醜陋可憎之極年命無幾復受死壞魂入長夜九幽之中配役三河禆塞長源寒癘切肌諸苦備經一切緣盡乃得更生人中之門形容端正人道備足年命無幾復受死壞魂魄方還三官都使驅馳百極流離鬼庭萬年罪竟乃得還生善人之門財寶無乏雖受寬泰年命無幾復受死壞魂神方還三官善鬼受任都伯統承生死千年根斷乃得受生通靈徹視坐見鬼神役使召制助國救民或輔帝王平斷四方年命無幾復受死壞魂神乃得為五帝賔友交遊神仙百年根對並消地謫周竟三官都統諸天記名乃得受生富貴之門王侯之家榮祿難勝根盡福生發心大願布散窮乏廣作功德而受滅度徑上天堂逍遙歡樂衣食自然二十四年更生貴門受氣智慧五心開聰修奉經法賤財重道慈心一切恭敬師寶功德未全復受滅度上升南宫朱陵度我命籍三界書我功名周流十方三十二天交遊上聖為太上之賔十年還在人中身作師宗宣通法音開度天人教化羣生展轉億劫無所不經死備三官徒對年限垂竟而又行惡心罪倍於常更受死壞復還三官對於徒謫苦痛過先如此一善一惡一緩一急一死一生一惱一歡艱辛轗軻億劫之中諸惡漏盡福德自生乃得還在富貴之門道得因緣供養經法七寶告靈發心善願功名得全為三界所舉五帝所明降致雲輿八景瓊輪駕空乘浮白日升晨被蒙天尊曲逮重恩拂飭朽骸得見光明超淩三界位登天真今日侍座歡樂難言天尊不以先昔所見淺狹觸事無能見使注筆解説天音命重教嚴不敢隱情輒極所見悉表乃心雖不覼縷然經歷前生億劫以來遊涉天元隨法生死恆值真文自不履其玄化洞於本根將感以私短而切申自然之書以解曲逮之文振琳琅之響叩瓊瑶之音義體雖不都備由足申演天地之根矣其諸天之中闊狹度數氣象變化日月星宿宫室山林真人城臺及魔王鬼神應承之所由其事深奧亦非可都詳且問難因緣亦已舊章載不復一二論為煩重今粗解天書五合文義其道足以開度天人拔諸苦根大法開張澤被十方今生來世男女善人當得此恩然按元陽玉匱九天推數運行靈關周回三十二天一交偽道出行萬姓心懷詐共崇奉此文當還大羅之上七寶宫中三五周竟萬道勢訖大聖隆興下世度人誅罷偽座退翦逆民道德興隆天下太平國主享祚十方寧焉真經輔世善瑞日生壬子之初乙卯之年至甲子之旬當有青帝九種仙人乘九色之龍出遊泰山齎此真經以掃不祥真經下世角音龍釋得遇吾此道其祚自強以保甲申普度天人其時歡樂此經之功也奉之者享福修之者神仙斯文玄奧廣覆無窮大法尊重伏願天尊普告諸天上帝大聖尊神日月星宿地上地下五嶽四瀆及河海水帝神仙真人十方世界諸靈官一切依大有之格俯仰之科禁儻漏慢祕而奉焉是時天尊舉手彈指天上天下地上地下無極世界一切神靈莫不祕奉諸天大聖衆同時稽首長跪稱善天尊告四座大聖衆無極太上大道君三十二天十方尊神等天真皇人曰龍漢之前在延康之中隨運生死至于龍漢乃受緣對魂形艱苦塗炭三官緣盡根斷得入福門經履天地一成一敗無復限極涉見天元恆值靈寶世世出法化度天人是以洞究天中之事能解天書自然之丈大法開明諸天所崇宜宣至理音究朗然故令注筆解其曲逮合和五方無量之音以成諸天普度來生其中玄奧信而可尊靈音既朗諸天光明天上天下地上地下十方無極世界一切神靈莫不崇奉依明真玄科舊制以玉童玉女各二十四人燒香侍真檢慢紏非不得輕宣四萬劫一出下世度人明各檢愼勿使有言是時四衆一時作禮稽首稱善天真皇人曰天書尊重度人無量貴而享福慢而禍臻諸是上天已得道過去無極大聖至真尊神及飛天神人五嶽神仙莫不備受崇奉天文自然之音以成至真者矣自非宿名金籙玉字上清終不得見脫於漏慢之中見其篇目神迷其心終不開悟有其宿分自當發心願樂神文生遇其世與文相值當齎七寶紋繒之信詣師告盟上聞諸天受而佩身得佩此文諸天所敬三界所稱五帝所侍地祇奉迎一切神靈莫不朝門將拔九祖於長夜開度死魂於九冥返受胎於靈氣得受生於富貴之門長與諸天交遊提携太上之賔也五老帝君宣告諸天地上五嶽靈山三河四海神仙真人玉女一切神明天真皇人開大有之妙化通自然之靈文天書尊重禁不輕傳今生男女心不懷二敬信自然受之者皆得升度奉之者皆得長年輕財重法致魔不言來生男女心當破壞各懷偽黠貴財賤道不信至真縱有歸向多以浮華意志不專貪竊窺覦致魔有言故玄科告禁以七寶紋繒質求人心有至學之士依科齎信便言名諸天頒告五嶽地上神仙一切記名宣示魔王保舉三清然後而傳有違玄科身負風刀萬劫無還九祖填夜長役河源一切神靈明識此言天真皇人告五老帝君我嘗於龍漢之中受文於無名常存之君俯仰之儀以丹筆書諸天八字之音合二百五十六字以黃繒為地佩身依明真玄科以金銀珊瑚琉璃硨磲水晶瑪瑙七寶鎮靈五色紋繒各四十尺以奉神真玄科之信不得輒虧至於有心窮乏不備貴得表真當量其輕重宜而授焉西王母以上皇元年七月丙午於南浮洞室下教以授清虛真人王君傳於禹封於南浮洞室石磧之中大劫交運當出於世以度得道之人太上靈寶諸天內音自然玉音卷之四
