body:
  text: 大梵隱語无量洞章玉訣天眞皇人曰天書玉字凝飛玄之氣以成靈文合八㑹以成音和五合而成章大運啓期琳琅自生神風虚奏韶響洞鳴煥乎諸天之上朗曜太幽之中與龍漢而俱化披赤明於延康錬水火於生死與億劫而長存開八垣於幽紐植靈光於太陽二儀持之以判三景持之以分上聖乘之以光五嶽寳之以靈一切得之以生國祚享之以安落落大範巍巍髙尊有中生無爲天地之根得之者不死奉之者長存寳之者眞降修之而神仙度死骸於長夜練生魂於朱宫妙化之文出於自然混之不濁澄之不清毀之不滅滅而復生髙秀太虚萬帝之宗威靈恢廓難可名焉東方青帝八㑹内音自然玉字九炁總諸天文太黃皇曽天五色玉童三十二人太黃皇曽天繡衣玉女三十二人太黃皇曽天五帝直符各三十二人太明玉完天五色玉童三十二人太明玉完天繡衣玉女三十二人太明玉完天五帝直符各三十二人清明何童天五色玉童三十二人清明何童天繡衣玉女三十二人清明何童天五帝直符各三十二人玄胎平育天五色玉童三十二人玄胎平育天繡衣玉女三十二人玄胎平育天五帝直符各三十二人元明文舉天五色玉童三十二人元明文舉天繡衣玉女三十二人元明文舉天五帝直符各三十二人七曜摩夷天五色玉童三十二人七曜摩夷天繡衣玉女三十二人七曜摩夷天五帝直符各三十二人虚無越衡天五色玉童三十二人虚無越衡天繡衣玉女三十二人虚無越衡天五帝直符各三十二人太極濛翳天五色玉童三十二人太極濛翳天繡衣玉女三十二人太極濛翳天五帝直符各三十二人九炁青天生仙功曹各三十二人九炁青天滅度自然功曹各三十二人九炁青天自然更生功曹各二十二人九炁青天飛天侍眞吏各三十二人九炁青天飛天衛眞吏各三十二人九炁青天飛天監眞使者各三十二人九炁青天直事吏各三十二人九炁青天傳言奏事吏各三十二人九炁青天飛龍騎吏各三十二人南方赤帝八㑹内音自然玉字三炁總諸天文赤明和陽天五色玉童三十二人赤明和陽天繡衣玉女三十二人赤明和陽天五帝直符各三十二人玄明恭華天五色玉童三十二人玄明恭華天繡衣玉女三十二人玄明恭華天五帝直符各三十二人曜明宗飄天五色玉童三十二人曜明宗飄天繡衣玉女三十二人曜明宗飄天五帝直符各三十二人竺落皇笳天五色玉童三十二人竺落皇笳天繡衣玉女三十二人竺落皇笳天五帝直符各三十二人虚明堂曜天五色玉童三十二人虚明堂曜天繡衣玉女三十二人虚明堂曜天五帝直符各三十二人觀明端靖天五色玉童三十二人觀明端靖天繡衣玉女三十二人觀明端靖天五帝直符各三十二人玄明恭慶天五色玉童三十二人玄明恭慶天繡衣玉女三十二人玄明恭慶天五帝直符各三十二人太煥極瑶天五色玉童三十二人太煥極瑶天繡衣玉女三十二人太煥極瑶天五帝直符各三十二人三炁丹天生仙功曹各三十二人三炁丹天滅度自然功曹各三十二人三炁丹天自然更生功曹各三十二人三炁丹天飛天侍眞吏各三十二人三炁丹天飛天衛眞吏各三十二人三炁丹天飛天監眞使者各三十二人三炁丹天直事吏各三十二人三炁丹天傳言奏事吏各三十二人三炁丹天飛龍騎吏各三十二人西方白帝八㑹内音自然玉字七炁總諸天文元載孔昇天五色玉童三十二人元載孔昇天繡衣玉女三十二人元載孔昇天五帝直符各三十二人太安皇崖天五色玉童三十二人太安皇崖天繡衣玉女三十二人太安皇崖天五帝直符各三十二人顯定極風天五色玉童三十二人顯定極風天繡衣玉女三十二人顯定極風天五帝直符各三十二人始皇孝芒天五色玉童三十二人始皇孝芒天繡衣玉女三十二人始皇孝芒天五帝直符各三十二人太皇翁重浮容天五色玉童三十二人太皇翁重浮容天繡衣玉女三十二人太皇翁重浮容天五帝直符各三十二人無思江由天五色玉童三十二人無思江由天繡衣玉女三十二人無思江由天五帝直符各三十二人上揲阮樂天五色玉童三十二人上揲阮樂天繡衣玉女三十二人上揲阮樂天五帝直符各三十二人无極曇誓天五色玉童三十二人无極曇誓天繡衣玉女三十二人无極曇誓天五帝直符各三十二人七炁素天生仙功曹各三十二人七炁素天滅度自然功曹各三十二人七炁素天自然更生功曹各三十二人七炁素天飛天侍眞吏各三十二人七炁素天飛天衛眞吏各三十二人七炁素天飛天監眞使者各三十二人七炁素天直事吏各三十二人七炁素天傳言奏事吏各三十二人七炁素天飛龍騎吏各三十二人北方黒帝八㑹内音自然玉字五炁總諸天文皓庭霄度天五色玉童三十二人皓庭霄度天繡衣玉女三十二人皓庭霄度天五帝直符各三十二人淵通元洞天五色玉童三十二人淵通元洞天繡衣玉女三十二人淵通元洞天五帝直符各三十二人太文翰寵妙成天五色玉童三十二人太文翰寵妙成天繡衣玉女三十二人太文翰寵妙成天五帝直符各三十二人太素秀樂禁上天五色玉童三十二人太素秀樂禁上天繡衣玉女三十二人太素秀樂禁上天五帝直符各三十二人太虚无上常融天五色玉童三十二人太虚无上常融天繡衣玉女三十二人太虚无上常融天五帝直符各三十二人太釋玉隆騰勝天五色玉童三十二人太釋玉隆騰勝天繡衣玉女三十二人太釋玉隆騰勝天五帝直符各三十二人龍變梵度天五色玉童三十二人龍變梵度天繡衣玉女三十二人龍變梵度天五帝直符各三十二人太極平育賈奕天五色玉童三十二人太極平育賈奕天繡衣玉女三十二人太極平育賈奕天五帝直符各三十二人五炁玄天生仙功曹各三十二人五炁玄天滅度自然功曹各三十二人五炁玄天自然更生功曹各三十二人五炁玄天飛天侍眞吏各三十二人五炁玄天飛天衛眞吏各三十二人五炁玄天飛天監眞使者各三十二人五炁玄天直事吏各三十二人五炁玄天傳言奏事吏各三十二人五炁玄天飛龍騎吏各三十二人太歲某年某月某甲子朔某日甲子某嶽眞人本命某甲子某月生某天領籍炁係某炁天君令於某炁天中從師某嶽先生道士某君受文佩身七寳鎭靈金繒誓心告靈盟天約爲身寳奉承大法俯仰舊典上告三十二天監度文命侍經仙郎韓司主録飛天眞人三界神王落某甲死籍勒上仙名金格玉籙三元品中依大囿威儀降下眞仙之氣入某身中三十二天監仙司馬典經羽郎各依格遣玉童玉女神眞之氣各一合下侍衛靈文奉給某甲身普關諸天諸地无極世界日月星宿三界官屬五嶽名山九江水府三官司罰九幽長夜泉曲之中無影無色無形無名無音無響無大無小無髙無下無尊無卑一切神靈咸各明某甲身奉大法佩帶天文名入仙籙三元品中出入遊行依舊伺迎一日三朝如紫微上宫削落地簡九幽目録滅絶宿根漸息惡縁不得拘逮億劫無連七祖同福皆得上昇逍遥玄都七寳林中魂受錬度時得更生某甲約承奉大法一如明眞撿身愼誡生死成仙五帝交友遊戲諸天愆盟負誓泄漏天文傳非年限生死謝對長負河源風刀萬劫鎭夜摙山罪福報對悉如盟文天眞皇人曰受度諸天内音自然玉字當依明眞典格以朱書白素上齎七寳鎭靈金繒效心拜黃繒章表告諸天度文露於中壇三日三宿不遇風雨文不飛颺合眞以傳諸天内音自然玉字大梵隱語无量洞章玉訣太黃皇曽天音玉訣第一東方九炁青天八㑹書音皇曽天中第一第二第三三字皆仰書玄都長樓之上其文以正天地之度數主召十方衆眞大神其次第四第五二字則書帝君遊臺南軒之上主空無之中生自然神眞其次第六第七第八三字書日月之門主通九幽之光開長夜之府字皆方一丈八角煥明皇曽天中天眞皇人曰修飛仙道當以月十齋之日朱書皇曽天中第一第二第三三字向王服之呪如法百日萬神朝已以月十五三十日朱書第四第五二字向東服之呪如法服之二十四年神眞並生生死皆得上昇帝君遊臺之上以月上下弦望之日朱書第六第七第八三字向月服之八年身内有光面作金色生死皆得上昇日月之舘受錬成仙佩其文三官無復惡對之録名書皇曽天中隨運生死億劫無窮其法妙重飛天齊功太明玉完天音玉訣第二玉完天中第一第二二字並書天西北玉關之上主天地劫數之期其次第三第四二字則書三界之門玉扇之上主始開分度其次第五第六二字書紫微上舘主罪福之場開生死之門其次第七第八二字書北元玄斗之中主制天關輪轉之度天書皆方一丈八角煥明玉完天中天眞皇人曰修飛仙之道當以戊辰戊戍之日朱書玉完天中第一第二二字向西北方服之呪如法皆得隨運生死劫劫化生位齊飛天以本命之日朱書第三第四二字向本命服之呪如法百日地官削死三界保仙生死皆得徑昇三便之門又以甲子之日朱書第五第六二字向北服之呪如上法百日三官削落罪簿上天勒録於司命曹幽魂則出長夜之戸受度更生福德之堂又以立春秋分之日朱書第七第八二字向王服之呪如法七年玄斗記名列仙帝晨七祖皆得駕乘玄羽之輦以昇玉晨之宫佩其文九幽則無宿對之魂長夜無復八難之根生死普受開度逍遥玄臺七寳林中清明何童天音玉訣第三何童天中第一第二二字題金華上宫主人生死圖録功過之根其次第三第四二字題玉京七寳玄臺主萬仙朝禮之儀其次第五第六二字題九靈舘主天地大期改易之運開玄化之牝敷廣度之功其次第七第八二字題北元玄關之上天地之氣御興廢之端天書皆方一丈八角煥明何童天中天眞皇人曰修飛仙之道當以七月七日朱書何童天中第一第二二字向南服之呪如法百日則九府削罪於地簡玄都記生於金文死者即得開度於九幽魂神上昇南極之宫又以八節之日朱書第三第四二字向北服之百日三界神眞來朝己形生死逍遥七寳林中又以戊戍戊辰日朱書第五第六第七第八四字向西北服之大運之災皆得過度水火之厄隨運更生始青天中玄胎平育天音玉訣第四平育天中第一第二第三第四四字並題太極上宫青華之門主衆眞玉女誦詠五和之音其第五第六二字題洞元之臺主天中慶雲之暉制和八音之章其第七第八二字題洞靈上舘主御帝君遊觀八極制天魔王開度眞人天書皆方一丈八角煥明平育天中天眞皇人曰修飛仙之道當以八節甲子之日朱書上四字向王服之百日玉女遊戲其房誦詠感徹降致帝王又以春秋二分二日朱書第五第六二字仰天存白雲而服之百日面有玉光神仙交通又以齋日朱書第七第八二字向王服之二十四年則生死同昇遊行八極變化八方逍遥玄都七寳林中元明文舉天音玉訣第五文舉天中第一第二第三第四四字書天三便之門主天元數之氣開大有之關通龍漢之眞其第五第六二字書融生之臺融生是南極上元之遊臺也主諸眞人玉女散五和之香以散天中之文其第七第八二字書紫陽之舘主靈風之氣迅慶雲之輪天書皆方一丈八角煥明文舉天中天眞皇人曰修飛仙之道以戊戍戊辰日朱書文舉天中上四字向天門服之生死皆得度陽九之災生更始之中上遊三界之庭身入三便之門又以齋日朱書第五第六二字向本命服之百日玉女下降萬神居身又以太嵗之日朱書第七第八二字向南服之八年體生玉光有自然之香萬眞交遊玉女在房七祖皆得遊於紫陽舘中七曜摩夷天音玉訣第六摩夷天中第一第二二字書玄都玉關之上主飛開大有之光而灑自然之靈其第三第四二字題紫微臺主開九幽之戸而出長夜之魂其第五第六二字書北靈之舘主開八書於空洞制萬魔於帝庭其第七第八書北極主生死圖録善惡簿筭合八字皆方一丈八角煥明七曜天中天眞皇人曰修飛仙之道以本命之日朱書上二字向本命服之一年生死皆與飛天齊功命過不經地官徑登玄都上宫又以庚申甲申之日朱書第三第四二字向西北服之七祖百日皆得去離長夜上登朱陵之宫八門也又以五月五日中時朱書第五第六二字向南服之二十四年皆得遊行摩夷天中召魔制靈威伏百萬又以七月七日朱書第七第八二字向本命服之百日北帝削死録南宫上生簿記筭司命生死受仙剋成眞人也虚无越衡天音玉訣第七越衡天中第一第二二字書元始玄臺之上主天地開閉之綱紀維羅八極之上道其第三第四二字書北上玄關之門主運度之炁其第五第六二字書天西北門上主五篇眞文隱明之運開生死之期其第七第八二字題九夜之臺主死魂歸靈受生還人生死筭録億劫縁根天眞皇人曰修飛仙之道以本命之日朱書第一第二二字向天門服之制身神與運生死長落福中不得去離又以行年之日朱書第三第四二字向地戸服之制身精氣與運生死長居南宫不離身形又以太嵗之日朱書第五第六二字向太歲服之八年五臟悉生紫光萬神並錬生死成仙又以冬至之日朱書第七第八二字向北服之九祖皆得去離幽夜上昇南宫身與元始同運輪轉億劫不絶飛天同功也太極濛翳天音玉訣第八濛翳天中第一第二第三第四四字書龍山九折之阿長樓之上主帝君遊觀俯仰之儀其第五第六二字書北斗玄臺主生死命籍其第七第八二字書南斗長生宫中主死魂度入南宫制受錬之神更生之名也天眞皇人曰修飛仙之道以八節日朱書上四字向王服之二十四年帝君下降上眞詣房以五月五日朱書第五第六二字向北服之北斗削落死籍度名生宫又以七月七日朱書第七第八二字向南服之南斗拔取死魂而錬度生宫入自然福堂受禄天厨也太上靈寳諸天内音自然玉字卷之一
