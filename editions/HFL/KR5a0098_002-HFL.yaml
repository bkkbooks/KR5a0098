body:
  text: 赤明和陽天音玉訣第一南方三炁丹天八㑹書音和陽天中第一第二第三第四四字書洞陽之舘主諸眞人及得道者受錬之名其第五第六第七第八四字書南極上宫主受錬之人給其羽儀而登眞之名也天眞皇人曰修飛仙之道以五月五日以朱書上四字向本命服之五年身神澄正内外光明却穢致眞神明交通又以七月七日朱書第五第六第七第八四字向太歳服之五内結仙項有圎像萬神侍衞羽儀自生位登眞人遊宴太清也玄明恭華天音玉訣第二恭華天中第一至第四四字書玉京山玄臺之上主天元開運變化之靈其下四字並書南極上元宫中主生死功過筭命簿録合八字皆方一丈八角煥明恭華天中天眞皇人曰修飛仙之道以立春之日朱書上四字向東服之八年萬神見形變化無方隨運生死億劫長存又以本命之日朱書其下四字向太嵗服之百日三官削死簿南宫書生録九幽開出九祖之魂朱陵迎取更生之形萬劫皆在七寳林中曜明宗飄天音玉訣第三宗飄天中第一至第四四字書天西南龍澤之山黃房之室主開明日月飛天眞人因縁之功其第五第六二字書日月上舘三光分度盈縮之數其第七第八二字書天中心玄關之上主四方无極世界分度之期合八字皆方一丈八角煥明宗飄天中天眞皇人曰修飛仙之道以本命之日朱書上四字向南服之身得過度太陽九之災驅除之中又以月上下弦之日朱書第五第六二字向日月而服之生死並離晻㝠恒處光明萬穢所不能干妖魅所不能傷又以太歳之日朱書其第七第八二字向太歲服之生死皆得周旋无極世界不拘五苦之難逍遥歡樂之中竺落皇笳天音玉訣第四皇笳天中第一第二二字並書紫微上宫主天文開明之期度人之名其第三第四二字書北帝寒靈之䆫主萬魔之精其第五第六二字書三便之門主制雲中謡歌之鬼其第七第八二字書南北二斗之門主生死功過善惡之名合八字皆方一丈八角煥明皇笳天中天眞皇人曰修飛仙之道以春分之日朱書上二字向東服之生死皆得度入朱陵受號爲仙又以立冬之日朱書第三第四二字向東北服之百日萬鬼束形敢爲干試學道自正神眞自降又以八節之日朱書第五第六二字向天門服之則誦詠朗徹上聞九天萬魔降伏道備成仙又以五月五日七月七日朱書第七第八二字向王服之百日北帝削死籍南斗書仙名生死皆得飛天眞人虚明堂曜天音玉訣第五堂曜天中第一至第四四字書玉京九層之臺主飛天眞人朝禮之典其下四字書南浮洞陽上舘主諸學者受度之品其八字皆方一丈八角煥明堂曜天中天眞皇人曰修飛仙之道當以八節之日朱書上四字向王服之生死皆得上朝玄都之宫受飛天灌五雲之華而成飛天眞人也又以五月五日七月七日朱書下四字向南服之則魂神受錬氣自澄正八景備字共舉人身上昇玄都之上騫林之中也觀明端靖天音玉訣第六端靖天中第一字書天關之上主四時之炁其第二至第四三字書北斗玄關之中主衆眞朝宴之儀其第五第六二字書金闕北壁主制天魔其第七第八二字書三便之門主學者應度之人合八字皆方一丈八角煥明端靖天中天眞皇人曰修飛仙之道當以八節之日朱書上一字向王服之百日萬災不能傷毒癘不敢干與四時休和洞明自然又以八節之日朱書第二第二第四三字向王服之百日萬神朝門又以立冬之日朱書第五第六二字向東北服之萬魔降伏鬼精束形又以七月七日朱書第七第八二字向本命服之南上書仙名於玉簿出幽魂於地下身入法輪之門遊宴開明之戸也玄明恭慶天音玉訣第七恭慶天中第一字書紫微之宫北壁之上主領萬神事其第二字書東華宫主制神龍龍王儀典其第三第四第五第六四字書三便之門主生死圖録總仙度品格其第七第八二字書南極宫中主五炁錬度儀典合八字皆方一丈八角煥明恭慶天中天眞皇人曰修飛仙之道當以正日朱書上一字向東服之則萬神侍衞威制十方又以立春日朱書第二字向東服之八年神龍爲使又以五月五日七月七日朱書第三第四第五第六四字向南服之百日北帝削死籍三界度仙品又以夏至日朱書第七第八二字向南服之百日面有玉光萬神安鎭五曰結仙太煥極瑶天音玉訣第八極瑶天中第一至第四四字書玉京山七寳臺上主諸眞人遊行儀典其下四字書紫微宫中主生死得道人受仙品日合八字皆方一丈八角煥明極瑶天中天眞皇人曰修飛仙之道當以八節之日朱書上四字向王服之修齋行道萬神侍衞誦詠朗徹衆眞下降又以本命之日朱書下四字向太嵗服之三宫削地簡紫微書名仙籙生死皆得上昇玉京之臺逍遥玄都紫微宫中元載孔昇天音玉訣第一西方七炁素天八㑹書音孔昇天中上四字並書南極玄䆫之上主諸得道人受錬品目其第五第六二字書南極洞陽之舘主得道人受錬進仙品目其第七第八二字書南上北䆫上主制萬魔干試之氣合八字皆方一丈八角煥明孔昇天中天眞皇人曰修飛仙之道當以五月五日七月七日朱書上四字向南服之身體受津内外光明萬神鎭宫又以本命之日朱書第五第六二字向本命服之三官削地籙南極度仙名又以立春之日朱書第七第八二字向北服之萬魔降伏鬼精滅爽神眞歸身飛太清太安皇崖天音玉訣第二皇崖天中上二字書金闕之南主天地開闢之運其第三第四二字書大羅之上通眞之房主諸塵穢之氣總得度人名其第五以下四字並書南宫福堂之上主諸飛天得道人髙下品秩合八字皆方一丈八角煥明皇崖天中天眞皇人曰修飛仙之道當以太歲之日朱書上二字向東服之生死皆得隨運徃來光明不絶又以八節之日朱書第三第四二字向王服之萬穢清蕩神氣澄正名書朱宫仙官來迎又以七月七日朱書下四字向南服之太極度仙品九靈記福堂生死皆受自然之厨歡樂七寳林中顯定極風天音玉訣第三極風天中上二字書月宫之隂主天王遊宴之儀制月光之散暉其第三第四二字書玄都紫房主天地劫㑹之期其下四字並書玉京玄臺主生死籙籍善惡功過合八字皆方一丈八角煥明極風天中天眞皇人曰修飛仙之道當以月生三日朱書上二字向月服之三百日面有金容身有光明又以八節之日朱書其下二字向西北服之皆得過大小劫㑹天地之災又以太歲日朱書其下四字向本命服之百日三官主除地簡南宫記仙名二十四年當有三色之雲迎子上昇景皇之庭逍遥太无之中位爲景霄眞人也始皇孝芒天音玉訣第四孝芒天中上四字並題南上朱陵之闕主生死開度善惡縁對赤簡之録其下四字並題日之上舘主得度之人受錬之容披九幽之戸入更生之門合八字皆方一丈八角煥明孝芒天中天眞皇人曰修飛仙之道當以本命之日朱書上四字向本命服之百日九幽削宿簡南宫記仙名生死滅度世生福門又以月十五日正中朱書其下四字向日服之三年日童下降面有日光滅度則得受錬而更生大運滿則得駕乘飛景之輿遊於三界之上大寂之庭七祖同福世世仙王也太黃翁重浮容天音玉訣第五翁重天中上二字題玄都九層長樓主召天中之魔其第三第四二字題三便之門主制天中魔王謡歌之音其下四字題北靈上舘主治萬鬼之牢合八字皆方一丈八角煥明翁重天中天眞皇人曰修飛仙之道當以齋日及行道求仙皆朱書上二字向北服之則魔試不干眞靈即降又以入山請乞及誦經之日皆朱書其第三第四二字向東北服之則誦詠明徹上天遥唱心神澄正七年成仙又以惡夢及爲百鬼所害朱書下四字向東北服之萬鬼東形三官攝妖魔精白滅神眞降身轉輪運足克成上仙无恩江由天音玉訣第六江由天中上四字書九天玉闕之上主四時之氣定隂陽之數其下四字則書明眞之臺主滅度之録領更生之人合八字皆方一丈八角煥明江由天中天眞皇人曰修飛仙之道當以八節之日朱書上四字向王服之則與四時之氣混同自然經災不滅履害不傷也又以本命之日朱書下四字向本命服之則九幽削録於地簡上生名於南陽七祖同福長入歡樂之堂上揲阮樂天音玉訣第七阮樂天中上二字書紫微臺北軒之上主得仙道者之品格其第三第四第五三字書南陽之臺主校幽夜之録開度更生之魂上昇朱陵之舘衣食自然居之福堂其下三字書大羅之上始陽之臺主上品之人得度大千之界昇无景之堂者也合八字皆方一丈八角煥明阮樂天中天眞皇人曰修飛仙之道當以正旦一日朱書上二字向東服之百日東華記名上仙之品又以七月七日子時朱書其下三字向北服之九幽削長夜之録南宫紀更生之名九祖即得去離五苦上昇玄中福祚之堂又以八節之日朱書其下三字向王服之滅度皆得上昇大羅之上逍遥七寳林中无極曇誓天音玉訣第八曇誓天中上六字並書東華宫青林之舘主天中空生自然之音其下二字書玄都玉臺之上主諸眞人服御五雲之精日月之光合八字皆方一丈八角煥明曇誓天中天眞皇人曰修飛仙之道當以登齋行道之日朱書上六字向王服之則聲參太極氣入神霄上帝遥唱計日成仙又以雞鳴時朱書其下二字服之而嚥雲牙百日面有光精五府充溢舉形錬仙九祖出幽夜更生人中功滿克得駕乘三素之軿遊宴紫微之宫也皓庭霄度天音玉訣第一北方五炁玄天八㑹書音霄度天中上二字書玄都長樓之上主天地開閉明自然之眞其第三第四第五第六四字書神樓之上主天地劫㑹之交度得道人錬以太和之炁使得入於自然之眞也其下二字書天門之扇主得度之人上詣天門受錬而還也合八字皆方一丈八角煥明霄度天中天眞皇人曰修飛仙之道當以正旦朱書上二字向東服之則隨運輪轉不失本形又以正旦朱書其次四字向東服之滅度即得受錬太和之炁而入自然之眞又以九月九日朱書下二字向西北服之己身滅度則與九祖同昇九天之門受錬而更生也淵通元洞天音玉訣第二元洞天中上二字書扶桑司靈之舘其次二字書東井華林之堂主洪水四出盈縮之度其下第五第六第七第八四字並書太極宫中主大水出時司命校録度學仙之人合八字皆方一丈八角煥明元洞天中天眞皇人曰修飛仙之道當以冬至及甲子日朱書上四字向北服之二十四年則能水行河伯伺迎萬靈侍衞天災不傷也又以朱書下四字佩身則名參帝録生死爲仙大水時朱書北向服之則鳥母迎以鳳輦上登崑崙之山逍遥遊觀洪波之津也太文翰寵妙成天音玉訣第三妙成天中上二字書月之上舘主明天地之隂陽通長夜之光其第三第四二字書三便之門主生死之籍度得道之人其第五第六第七第八四字書紫微雲宫主生死得度之人羽服飛行之儀合八字皆方一丈八角煥明妙成天中天眞皇人曰修飛仙之道當以月生三日朱書上二字向月再拜而吞之七年身内發明照見五内又以八節日朱書其第三第四二字向王服之皆得度大㑹之災身爲聖王之民五帝保舉位列仙王又以八節日其下四字向王服之生死皆得上詣朱陵受仙衣羽服而遊諸天也太素秀樂禁上天音玉訣第四禁上天中第一第二二字書玉臺之上主空洞自然之書其第三第四二字書三便之門主生死圖籍試得道之人其第五第六第七第八四字書紫微長樓主總監諸天氣主得道人昇遷之名合八字皆方一丈八角煥明禁上天中大眞皇人曰修飛仙之道當以正旦朱書上字向王服之身與四時節候相應誦詠靈音上參晨霄又以七月七日中時朱書第三第四二字向本命服之百日北帝削死籙南宫上仙籍魔王保舉生死得道也又以八節之日朱書其下四字向王服之七祖八年皆得上昇朱陵之府身與諸天同友交遊上清也太虚无上常融天音玉訣第五常融天中上四字書紫微上宫通陽之舘主得度之人功德輕重之品其下四字書天北元玄斗之中主錬度得道人身以遷自然之堂合八字皆方一丈八角煥明常融天中天眞皇人曰修飛仙之道當以七月七日朱書上四字向王服之百日三界書其功名名上朱陵之府七年位爲眞人又以正旦朱書其下四字東向服之生死皆受自然光明去離九幽之根昇入无極福堂也太釋玉隆騰勝天音玉訣第六玉隆天中上四字書玉清雲宫主衆聖上朝之儀典主雲霞而聚雲也其下四字書紫陽上舘主自然之音和空洞之章合八字皆方一丈八角煥明玉隆天中天眞皇人曰修飛仙之道當以八節之日平旦正中日入三時朱書上四字向王服之百日萬神朝已二十四年則致碧霞之輦上昇七寳雲宫又以八節日正中朱書其下四字向王服之八年則能自然知諸天之音洞達玄虚與道合同也龍變梵度天音玉訣第七梵度天中上二字書紫微太虚之舘主度得道上昇之人其下六字並書南陽上宫紫臺之軒主得道功勲輕重之叙合八字皆方一丈八角煥明梵度天中天眞皇人曰修飛仙之道當以正旦朱書上二字向王服之八年朱宫書名飛天同功又以七月七日朱書下六字向南服之二十四年自然識其先身宿命因縁之根生死皆得上昇玉清之天歡樂宫也太極平育賈奕天音玉訣第八賈奕天中上四字書玉清上宫太極陽臺主虚無自然生眞之號其下四字書北闕玄牝之戸主六梵之炁錬度得道之人合八字皆方一丈八角煥明賈奕天中天眞皇人曰修飛仙之道當以正旦朱書上四字向東服之九年坐之自然空中之事太極書名於仙録之品又以立冬之日朱書下四字向北服之百日六府受眞體生光明二十四年生死皆得上遊大羅之上逍遥之林也天眞皇人曰修飛仙之道滅度之法尸解隱化輪轉生死隨運逍遥無拘太隂當朱書諸天玉字无量内音白素佩身隨文服御心不受穢五内清和六府恬寂空泊無爲八年洞達諸天坐見十方神眞交降體生玉光馳騁龍駕白日登晨玉章上道四萬劫一傳修行之法當依上朱書隨四時之節春正月二月三月當朱書文向王叩齒九通呪曰飛天大梵維羅八方九炁青天總爲神王五合八㑹流煥太空上開龍漢神仙之宗下拔長夜九幽之房拔度苦魂朽骸生光身變毛羽五色衣裳蒼龍碧輦飛歩行空今日上告青天始陽萬願諧合與炁齊同昇入無形永保無窮畢服文仰嚥八炁止夏四月五月六月當朱書文向王叩齒三通呪曰天書敷羅梵行赤明上通八道五合通靈大運啓期洞陽錬精玉文煥朗三景自明下度生死一切受形今日良吉大聖臨庭九幽開牖幽房朗清三惡休息我道自成五帝保度上登華京七寳林中長享劫齡畢服文仰嚥八炁止秋七月八月九月當朱書文向王叩齒七通呪曰飛玄八㑹結炁成眞六十四字總靈天根開度生死朽骨還人幽魂披散受炁上玄今日時慶萬願開陳衆眞交㑹我願成仙景與道合我願我神得乘素雲上昇帝晨七寳歡樂交友眞人畢服文仰嚥八炁止冬十月十一月十二月當朱書文向王叩齒五通呪曰玉字開明流煥上門八炁結眞梵行景雲神王啓光三象洞分五色徘徊照我靈魂今日值合仰希帝君開有出書授我眞文玉澤交灌五府生眞毛羽變化駕景乘晨出有入無仙度自然七祖同歸歡樂上元畢服文仰嚥八炁止天眞皇人曰此呪說之辭皆四㑹之炁八和之音自然之章行之者上天遥唱三界設禮萬神冠帶侍衞靈文也隨節服御呪說嚥炁百日諸天記録地官削簡八年神眞自降體生玉光洞達幽靈坐覩自然死尸更生返月還人輪轉不滅生死得仙道尊法妙四萬劫一傳輕泄漏慢身負河源風刀萬劫終不得仙明眞有格宜祕之焉太上靈寳諸天内音自然玉字卷之二
