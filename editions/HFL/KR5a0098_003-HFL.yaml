front:
  text: 太上靈寳諸天内音自然玉字卷之三收三
  hash: sha256:11036328b345718d32339cc7616884f3870e1cb54e933d3cffe1fe9354d00c54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0098_HFL_003-001a, image: hfl/0049/0049-084.png}
body:
  text: 大梵隱語无量洞章元始天尊時與五老上帝十方大聖衆无極至眞諸君丈人同於赤明世界栢陵舍坐香林園之中長桑之下天尊廻駕諸天降席是時雲霧鬱勃四景㝠合三日三夜玄隂不解天地無光有如龍漢之前幽幽㝠㝠五老上帝前進作禮上白天尊今日侍座所未嘗經天尊出遊則諸天傾駕上帝髙眞神仙玉女日月星宿璇璣玉衡三界官屬五嶽神仙河海水帝一切神靈莫不振肅侍衞天眞當時天朗氣清風不摇條地無飛塵河海靜黙山嶽藏煙時和氣定使生死同歡而閉天光明白隂㝠天人惶怖四座不寧不審何故所縁如是願垂告誨令衆見明饒益一切普得安全天尊告曰今日同坐歡樂難遇諸天發瑞靈應自然玉字煥爛障蔽天光未通之始致如晝㝠日慶時合希所嘗有今當普爲四衆開天妙瑞度一切人咸令四座閉目伏地於是天聖衆同時閉眼伏地聽命俄頃之間天氣朗除㝠晻豁消五色光明洞徹五方忽然有天書字方一丈自然而見空玄之上五色光中文采煥爛八角垂芒精光亂眼不可得看天尊普問四座大衆靈書八㑹字無正形其趣宛奥難可尋詳天既降應妙道宜明便可注筆解其正音使皇道既暢澤被十方天眞皇人稽首作禮上白天尊自隨運生化展轉億劫屢經侍座未有今日遭值聖道開諸法門得見天書自然至眞斯八㑹之氣合五和之音非愚情短思所能洞明今既厠座次仰覩玄妙被命狼狽不敢藏情逆用張惶若無神守輒竭所見解注其音冀萬有一合開示來生不及之體惟蒙曲憫於是靈妃按筆太眞拂筵玉女執金童颺香月宫散花日精灌津五老監試三界衛眞分其分度三十二天天有八字其太黃皇曽天太明玉完天清明何童天玄胎平育天元明文舉天上明七曜摩夷天虚無越衡天太極濛翳天八天合六十四字位屬東方九炁青天其赤明和陽天玄明恭華天曜明宗飄天竺落皇笳天虚明堂曜天觀明端靜天玄明恭慶天太煥極瑶天八天合六十四字位屬南方三炁丹天其元載孔昇天太安皇崖天顯定極風天始黃孝芒天太皇翁重浮容天無思江由天上揲阮樂天无極曇誓天八天合六十四字位屬西方七炁素天其皓庭霄度天淵通元洞天太文翰寵妙成天太素秀樂禁上天太虚无上常融天太釋玉隆騰勝天龍變梵度天太極平育賈奕天八天合六十四字位屬北方五炁玄天四八天合三十二天合二百五十六字皆三十二天大梵隱語无量之音天有飛玄自然之炁合和五音以成天中无量洞章上演諸天之玄奥讃大有之開明中理自然之炁普度學仙之人下度生死之命拔出長夜之魂元始妙法億劫長存其音既朗其道行焉大法開明諸天稱慶无極大聖衆至眞諸君丈人五老上帝十方尊神神仙玉女一時行香旋行三帀而作頌曰天尊廻玉駕降席香園中至眞大聖衆无極天中王神仙導日月鬱鬱披雲宫五帝翼華轅三界備十方日慶衆眞㑹歡樂難爲𩀱妙㑹自然感靈瑞發空洞煥爛啓幽期障蔽日月光玄隂不解夜四象並安恭靈運自應圖儵歘朗太空靈書八㑹字五音合成文天眞解妙韻琅琅大有通玉音難爲譬普成天地功上植諸天根落落神仙宗中演玄洞府坦明八幽房開度生死命拔出長夜亡地獄五若解刀山不生鋒五道無對魂億劫並少童堂堂大乘化一切不偏功元始出玉文是爲天中王不勝情歡喜飛歩誦靈章天尊開大有落落諸天明妙哉龍漌道八㑹結成形煥爛飛空内流光三界庭神圖啓靈㑹玉書應景生天眞通妙趣五和合成經琅琅玉音響飄飄翠上清開度無終劫九幽受光明巍巍大法門教尊一切生斯功不可勝歡樂度萬齡是時惠澤普流恩被十方信向不死皆得長年老者還少病者即康枯骨生氣死魂還人五苦解脫地獄寧閑預以有心皆得神仙矣天尊吿四衆至眞今日同坐一劫之中開天靈婁自然玉書度一切人其福弘普廣益衆生大法既陶恩無不帀无極世界皆受光明九幽開宥長夜赦魂生者歡樂死者蒙還諸天人民宿對種親是男是女善惡命根無始以來至于今生生死展轉殃對相牽天地成敗功過難明令依大有普吿諸天日月星宿璇璣玉衡南斗北斗司命司録韓君主録南昌上宫諸地諸水五嶽靈山三官九署十二河源長夜之府九幽之中四司五帝一切神靈採筭録籍推校本源無善無惡輕重之根生死右別條名列言一切削除斷絶因縁普同一度以今爲新令此一切成得道眞大福所普勿使有偏天尊有命諸天敬從於是四衆同起作禮舉手指上俛手指下无上无下无極无窮无深无逺无幽无隱无大无小无始无終一切普度同受光明彈指吿衆一切咸聞是時四衆同時抗手仰天彈指三十二天日月星宿一時俱明地下九幽无極之底光景洞徹无復暗㝠幽隱普見地藏露形山川溪澗一等緬平冬華結實枯樹發榮慶加一切功載衆生魚龍踊躍鳥獸欣鳴靈歌交㑹路無悲聲天靜地黙三官潜寧簡對休息五道不生人神歡泰聖道太平天眞皇人曰諸天内音自然玉字皆諸天之中大梵隱語結飛玄之炁合和五方之音生於元始之上出空洞之中隨運開度普成天地之功斯文尊妙不譬於常是故開大有之始而閉天光明以寳其道而尊其文其字宛奥非天書之無形眞貴其妙象而隱其至眞妙感應圖其法運行天尊不以我之才呐而見命勑使解其義通其玉音玄科有制不敢違命按筆之日形魂頓䘮率我所見聊注其文是之與非極我乃心皇道既明諸天稱慶一切覆載生死並歡大福普帀我情自欣惟願四衆咸見體明於是四衆至眞尊神一時稱善天上天下地上地下无窮无極彌羅世界一切神靈莫不範德尊崇大聖欣道開明惟願大法廣度无終福流億劫世世長存慶加願㑹普得道眞不勝罔極四衆同時俱起作禮稽首受命太黃皇曽天音第一太黃皇曽天中有自然之書八字文曰亶婁阿薈無惒觀音天眞皇人曰其八字飛玄自然之書字方一丈文彩煥明洞輝八方元始下教使撰其字解其音合成皇曽天中大梵隱語无量之音以付道君使教皇曽天中宿有仙名者度應得道人也皇曽亶元紀婁都界上京阿那震琳響薈秀何宛延元無中生眞惒答通明梁觀覺朗四㝠音韻自成章天眞皇人曰其章以皇曽天中合五方飛玄之炁以和八字自然之音曰无量洞章皇曽天去太明玉完天九億九萬炁元紀以八方維羅之極婁都者天中心長樓之名上承太玄之宫玉京之山也阿那以婁都之監主六梵之數數交則婁都鼔鳴衆眞上朝薈秀則帝君之遊臺惒答則日月之門户眞人乘金輪以開㝠玉女仗華旛而披紐觀覺主長夜之録四㝠拔出九幽之府若能修齋於八節誦洞章以和魂則七祖披朗朽骸還門佩赤書於八字明通无量之音將乘雲車以上造逍遥七寳之林仙童玉女侍衞之焉太明玉完天音第二太明玉完天中有自然之書八字文曰須延明首法攬菩曇天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成玉完天中大梵隱語无量之音以付道君使教玉完天中宿有仙名者度應得道人也大明須靈會延侍開玉眞明道梵玄路百披入三便法輪洞幽遼攬覺大模新菩提御綱運曇頥自廻椿天眞皇人曰其章玉完天中合五方飛玄之炁以和八字自然之音曰无量洞章玉完天去清明何童天八億萬炁須延者玉完天西北闕之號大劫之交須延而開玉眞大聖於是而廻明道則元始之都候元始開運則都候啓道梵行諸炁倐歘自朗三便則三界之門能知八字之音則過三便之上身登大羅之天法輪則罪福之塲攬覺則生死之端誦靈音於洞章則名書於紫宫法輪列籍於司命攬覺度魂於更生菩曇三元上聖執九色之麾曇頥把十絶之旛上眞轉九色以輪還曇頥旋十絶以停輪天地得之以無傾萬道得之以長存神仙誦之以飛空五嶽保之以致安國祚享之以無窮大劫可以保命生死可以善縁奉之者延年修之者飛仙也清明何童天音第三清明何童天中有自然之書八字文曰稼那阿奕忽訶流吟天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成何童天中大梵隱語无量之音以付道君使教何童天中宿有仙名者度應得道人也清明稼禄滋那徑返龍山阿秀玉林條奕奕四垂騫忽覺靈劫化訶摩以敷晨流眞三界庭吟嘯來運懃天眞皇人曰其章何童天中合五方飛玄之炁以和八字自然之音曰无量洞章何童天去玄胎平育天七億萬炁稼那者天中玉圖先生治金華之宫與龍山連字煒燁玉清之上鬱勃洞虚之中領人生死圖録總主神仙阿奕則七寳林中樹名彌覆四方上聖之遊圃眞人之戲園忽覺元始飛天神人也主大小劫㑹訶摩無名之號劫運既終訶摩則以開㝠敷法教普度天人是時歡樂道教流行天度炁促人道轉䘮末運破壞故爲流吟萬劫種善宿有玄名得遇天音修誦洞章玉圖先生則消罪録於長夜注名南極長生之宫七祖被幽而更始死户更華琳琅之方因縁不絶世世爲仙王也玄胎平育天音第四玄胎平育天中有自然之書八字文曰華都曲麗鮮菩育臻天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成平育天中大梵隱語无量之音以付道君使教平育天中宿有仙名者度應得道人也華都秀東宫都梵飛天歌曲爽澄虚漠麗宛從空和鮮雲䕃靈宇菩婁迓參差育王乘景輪臻是鬼神家天眞皇人曰其章以平育天中合五方飛玄之炁以和八字自然之音曰无量洞章平育天去元明文舉天六億萬炁華都則天中太乙宫青華門之别名上有梵天神人飛遊太極之上玄歌无量洞章曲爽靈風之氣恒拂揚洞章之曲麗宛太和玉女也於華都之門而和神人之歌鮮雲者則慶雲之舒敷以散八音之上平育天帝之隱名常乘八景之輪遊觀太極之外廻十絶之旛以召大魔之王平育天音衆眞所崇誦之者飛天遥唱佩其文三界伺迎七祖出長夜上昇南宫輪轉化生世爲王門仙童玉女侍衞身形道成飛行上昇平育天元明文舉天音第五元明文舉天中有自然之書八字文曰答落大梵散煙慶雲天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成文舉天中大梵隱語无量之音以付道君使教文舉天中宿有仙名者度應得道人也文舉答和闕落落冠三門大有開龍漢梵天敷景雲散馥延霄階氤氲自生華靈風流返香雲上儛空輪天眞皇人曰其章以文舉天中合五方飛玄之炁以和八字自然之音曰无量洞章文舉天去摩夷天五億萬炁答惒者天中之玉闕以界三便之門大梵既行元炁通明者也故龍漢推數而自開赤明待運而敷晨眞人散香於玉庭氤氲揚熏以拂眞慶雲棲乎紫舘飛天儛乎空輪慶大宥於元始欣八字於自然明玄文以度衆音洞章以成仙奉之者脫苦修之者成眞七祖同歡世生仙門也上明七曜摩夷天音第六七曜摩夷天中有自然之書八字文曰飛灑玉都明魔上門天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成摩夷天中大梵隱語无量之音以付道君使教摩夷天中宿有仙名者度應得道人也上明飛延康灑都出龍漢玉眞開玄夜酆都度八難明道結空章魔王稽首讃上有始生人門下典録筭天眞皇人曰其章以摩夷天中合五方飛玄之炁以和八字自然之音曰无量洞章摩夷天去越衡天四億萬炁飛者飛天神人之號天地改運淪於延康㝠㝠無開飛天啓光於散輝諸天受炁灑虚玄都龍漢一㑹倐歘四廻而玉眞者大聖之號都有九幽之酆都人有善功則大聖開玄夜之户酆都度八難之場七祖於是而返還幽魂於是而光明道則八字而開洞章度死魂而還康神魔於是而伏五雲玄哺爲糧上帝育養始生之神門下韓君司録度筭於南宫自非前生萬劫宿有善名者莫得盻其篇目參此洞章奉之者福流九族生死蒙恩修之者身生水火白日登晨也虚無越衡天音第七虚無越衡天中有自然之書八字文曰無行上首廻蹠流玄天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成越衡天中大梵隱語无量之音以付道君使教越衡天中宿有仙名者度應得道人也七曜無上道行綱梵玄機上轉天一關首運倐歘開廻靈非始駕蹠起入空飛流晨制長夜玄隂自然歸天眞皇人曰其章以越衡天中合五方飛玄之炁以和八字自然之音曰无量洞章越衡天去濛翳天三億萬炁無者元始之炁開明无上之道行者元元之綱紀維羅八極上首者北斗四非之宫也運轉天關推㑹度數天數極則大劫交運廻蹠五篇眞文之化乘大運之終而五篇明焉空無而出天地自開人有善功宿名玄都即拔長夜魂出九幽更生善門長離玄隂生死福中越衡天上都之京有空峯之山乃萬聖之所遊生死之所歸學洞玄之道道成得仙徑昇空峯之上受號而騰空也道未備足身應滅度魂昇空峯受錬而度南宫也越衡之㫖理極於此矣太極濛翳天音第八太極濛翳天中有自然之書八字文曰阿陀龍羅四象吁貟天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成濛翳天中大梵隱語无量之音以付道君使教濛翳天中宿有仙名者度應得道人也濛翳阿僧嶺陀丘交靈勢龍阜立空峙羅映曜雲袂四宫生眞景象輪梵三界吁育錬朽魂貟童度生契天眞皇人曰其章以濛翳天中合五方飛玄之炁以和八字自然之音曰无量洞章濛翳天去赤明和陽天二億萬炁阿者天中有九折之山連阿相屬陀者山上之樓上通玉清之炁八望三界之郷帝君乘三素之雲駕九龍之輿上遊阿丘之嶺下監萬生之罪福龍者龍山與阿陀相去九億萬里山勢相交日月明於二山故羅瑛曜雲也皆日月之名四者四極之宫中有四極眞人主人命籍眞人常駕象輪之車遊行三界之中校人生死罪録開度學道之人佩此文誦詠洞章則三界之官皆條名列言九幽削於地籍長夜抜出死魂玉名八於帝簿生死度於南宫吁貟則長生宫中度命之君得入南宫吁貟即錬度於朽魂貟童日中之生童即灌其津著生契於四極洽自然之羽章七祖歡於福堂延年萬嵗世生仙王身度三惡之道過度八難之場三界稽首而侍衞五帝肅然而奉迎其八天分屬東方始青之炁炁炁相生彌羅八極故天有八音皆八㑹之炁結而成章也元始天尊吿太上道君曰赤明始開其八天之炁分度並屬東方青天天有八字合六十四音皆天中大梵隱語无量之音行九炁天君之道當佩其音誦其章出入遊行當叩齒九通思九色之龍導從前後青雲九重覆帀身形宻呪曰亦明開圖八炁廻眞總統玄關青帝大神流化九天纏綿我身靈音八書六十四篇開明天地與我合仙運致龍駕上昇帝軒畢引炁九嚥止行之九年八天各以青腰玉女青華玉童各八人侍衞身形致青芽九炁之精生身光明徹見虚無萬徧道成即得飛行其道尊法弘教普度無窮七祖同福皆昇南宫九年並得更生善門之中勤爲護度諦受勿忘道君稽首奉受命㫖赤明和陽天音第一赤明和陽天中有自然之書八字文曰南閻洞浮玉眸詵詵天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成和陽天中大梵隱語无量之音以付道君使教和陽天中宿有仙名者度應得道人也赤明南上炁閻光流八精洞門吐丹暉孚景自髙明玉澤充絳府眸華乘運征洗垢澄虚漠詵詵歩三靈天眞皇人曰其章以和陽天中合五方飛玄之炁以和八字自然之音曰无量洞章和陽天去玄明恭華天九千萬炁南閻者和陽天中有流火之庭爓光煥乎八方洞浮者則洞陽之宫南極眞人治於宫中諸是學人始得道者皆詣流火之庭受錬而成眞然後而得進入洞陽之宫玉眸流火之膏也既受火錬體生玉光絳府充溢萬神並歸侍衞身形輔翼羽衣位登上眞遊宴紫微道業未備運應滅度魂經洞陽則受錬而洗塵埃澄蕩早還更生輪轉三界無有罣凝故詵詵歩三靈也自無前生萬劫宿有善縁不得盻其音章玄明恭華天音第二玄明恭華天中有自然之音八字曰梵形落空九靈推前天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成恭華天中大梵隱語无量之音以付道君使教恭華天中宿有仙名者度應得道人也上眞梵元始形化觀妙音落景隨運逥空中讃瓊林九玄導明首靈童生朽心推元拔夜領前魂飛霄吟天眞皇人曰其章以恭華天中合五方飛玄之炁以和八字自然之音曰无量洞章恭華天去宗飄天八千萬炁梵形者元始天尊也開龍漢之劫登赤明之運號曰元始上皇開運號元始丈人隨世化生故以一神落空者元始空中而出既有天地日月三光而知空中有眞文也靈者九華眞人治於南上宫中主九幽之下宿對死魂推前者推筭生死功德人有善功三官列言九靈即命主録筭其功名拔出九幽七祖之魂魂神披散昇上南宫歡樂自然飛霄歌吟天中有散華之臺四斗眞人所處焉臺下有三寳之林元始書洞章於林中四斗眞人書迎延之符於臺軒得佩上天之音眞人克受迎延之符得見迎延之符逍遥恭華之臺此符使人項負寳曜體映玉光氣合三素靈洞太空恭華之音理妙自然也曜明宗飄天音第三曜明宗飄天中有自然之書八字文曰澤洛菩臺緑羅大千天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成宗飄天中大梵隱語无量之音以付道君使教宗飄天中宿有仙名者度應得道人也曜明澤龍階洛覺幽中恱菩題億萬衆臺上三萬日緑帔飛青衣羅英秀玉質大羅元上色千劫同一秩天眞皇人曰其章以宗飄天中合五方飛玄之炁以和八字自然之音曰无量洞章宗飄天去皇笳天七千萬炁澤者天中山名其山上衆龍所崛山有黃房之室一名玉客之臺洛覺者眞晨道君之内名治於黃房之中混大劫而不終經龍漢而更明故幽中而悅焉菩題者飛天眞人之隱號有無數之衆飛於玉臺之上玉臺處於澤山之陽三萬日月明其左右羅映則日月天人之内名治在日月之宫上乘大羅之天梵行之炁運六度之關以應天地之數數之欲終大劫交㑹大劫既交諸天日月㑹於玉臺也大千世界之分天地改易大千同一而存焉人佩諸天之音誦諸天之章則得駕陵羽之車上昇黃房之室玉臺之上也竺落皇笳天音第四竺落皇笳天中有自然之書八字文曰眇莽九醜韶謡縁邅天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成皇笳天中大梵隱語无量之音以付道君使教皇笳天中宿有仙名者度應得道人也竺落眇眇化莽莽龍漢初九道并惡元醜鬼不生軀韶爽元中縱謡歌亂太虚縁綱整三炁邅值羅天衢天眞皇人曰其章以皇笳天中合五方飛玄之炁以和八字自然之音曰无量洞章皇笳天去堂曜天六千萬炁眇眇者元始淪於延康之中天書玉字翳而不彰龍漢開運其文莽莽世遇道眞男女並皆壽三萬六千歲其運之極又經一劫九炁各生獸以害惡氏其劫既開後而九獸改號爲九醜之鬼北帝上眞主生死圖録故立九醜以輔三官數極九九八十一萬度天炁之反九醜當得轉號爲九都使者也韶者皇笳天中神霄王之内名神霄王魔王之主常試教學道之人學正與不正魔王恒作謡歌以亂之心固者王即保舉得王保舉徑昇皇笳天中縁邅則南北二斗君之内諱人有善劫則列言於南斗南斗則度三界之難拔九幽之苦宣吿魔王不敢敗之也人之行惡三官列羅於北斗北斗則吿下於魔王魔王而滅之焉魂付九幽之下充長夜之役萬劫無期長淪惡縁皇笳天中有金華之山山有五帝之宫常生五色之雲日月俠乎左右飛仙翼其華軒學成得道皆詣金華之山受太乙之信以制神霄之王滅大魔之試然後而得乘景輪之車遊宴於八方也虚明堂曜天音第五虚明堂曜天中有自然之書八字文曰雲上九都飛生自騫天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成堂曜天中大梵隱語无量之音以付道君使教堂曜天中宿有仙名者度應得道人也虚明雲天子上關玄玄門九疊鬱陵增都宫羅玉根飛香繞十絶生炁錬五魂自開不死路騫林歌要言天眞皇人曰其章以堂曜天中合五方飛玄之炁以和八字自然之音曰无量洞章堂曜天去端靖天五千萬炁雲上者飛天神人内諱也開龍漢之劫啓赤明之運敷自然之書立天地之根三象既分而有九層之臺處乎玉京之山煥乎玄都之上飛天常散百和之香流五雲之華以灌飛天眞人臺上有太眞玉郎一日三廻十絶之旛廻旛一周則諸天上朝繞臺三帀誦詠洞章飛生者南上更生之神也學人能誦洞章聲參上宫諸天稱慶飛生即爲開不死之路流長生之炁下錬五魂之神魂神受錬八景存焉八景備守則共舉人身上昇九層之臺遊於騫林之中身佩天書口誦洞章二十四年期得上朝玄都之宫也觀明端靖天音第六觀明端靖天中有自然之書八字文曰那育郁馥摩羅法輪天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成端靖天中大梵隱語无量之音以付道君使教端靖天中宿有仙名者度應得道人也端靖那梵語育延十轉天郁黙誦靈歌馥童唱劫年摩夷聞稽首羅宻自束身法化開滅度輪轉咸歸眞天眞皇人曰其章以端靖天中合五方飛玄之炁以和八字自然之音曰无量洞章端靖天去玄明恭慶天四千萬炁那者天王侍郎之内名生成四時之炁梵行虚無之綱以正端靖天中之分度育者天關之空輪也郁馥中斗靈童之名常運育輪於太無廻十轉以召其天關十轉則十方大聖上朝玉宫萬神齊眞而郁馥唱焉摩羅者天中大魔之内諱也郁馥一唱則魔王束身天開八方法輪之門以度下世學者之身學知四時之炁十轉之關則入法輪之門駕乘八景之輿昇乎玉清之中上朝紫微之臺位及衆眞之賔也玄明恭慶天音第七玄明恭慶天中有自然之書八字文曰霐持無鏡攬姿運容天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成恭慶天中大梵隱語无量之音以付道君使教恭慶天中宿有仙名者度應得道人也玄明霐雿都持甖注東華無色玄玄宗鏡飊宛大羅攬覺妙自歸姿生豈云多運抗不終劫容納保太和天眞皇人曰其章以恭慶天中合五方飛玄之炁以和八字自然之音四无量洞章恭慶天去極瑶天三千萬炁玄明則恭慶天之根也霐者天上都監之神内名也雿都是紫微宫曲房之號都監之神治曲房之内總衆眞之録黃簡之文持者龍廐之名衆龍蟠乎其中常銜金甖而運東井之華以灌諸天眞人華者月中黃華之精沃注東井之中流津無窮之源無鏡者則飛天神王遊於大羅之上出無色之光總生死之籍開度學道之人攬姿者是三界之門知攬姿之號則神王拔出九幽之魂開長夜之府度於三界之門也運容者則太和玉女人度三界則運容導以朱靈之炁灌以太和之津形上福德之堂保劫運而無窮也太煥極瑶天音第八太煥極瑶天中有自然之書八字文曰馥朗廓奕神纓自宫天眞皇人曰其八字飛玄自然之書字方一丈文彩煥曜洞明八方元始下教使撰其字解其音合成極瑶天中大梵隱語无量之音以付道君使教極瑶天中宿有仙名者度應得道人也太煥馥上京朗臺秀西靈廓爲大模範奕奕神公生神爲滅度宗纓絡拔長㝠自入更起門宫中歡長齡天眞皇人曰其章以極瑶天中合五方飛玄之炁以和八字自然之音曰无量洞章極瑶天去孔昇天二千萬炁太煥者則極瑶天之始元也赤明始開八字煥乎空玄之上而極瑶之天於是植焉馥朗是天中玉京玄臺之別號西靈眞人常誦无量洞章旋行其上廓奕則是天中神公之内名與元始同生爲玄炁之範開滅度之門教學仙之人君能明八字之音則神公開長㝠之户身入更起之門上登玉京之臺歡樂紫微宫中有神纓之章滅度之屍得神纓之童一歌无量之章立得返形於三錬之房身受自然之炁歡樂無窮之齡也元始天尊告太上道君曰赤明始開其八天之炁分度並屬南方丹天天有八字合六十四音皆天中大梵隱語無量之音行三炁天君之道當佩其音誦其章出入遊行常當叩齒三通思朱雀鳳凰翻翔其前絳雲三重覆帀身形宻呪曰三炁徘徊靈鳳來飛玉音八字煥爛紫微日吉大慶我道洞開朱丹哺飴仰噏靈暉身生水火絳帔羽衣登空玄歩足踐鳳梯周旋八天七祖相隨畢引炁三嚥止行之三年八天各以太丹玉女太陽玉童各八人侍衞身形降致朱丹三炁之精返白留容萬劫不傾七祖同昇上入福堂返胎王家即得更生其法弘普廣度無窮勤爲用心諦受勿忘道君稽首奉受命㫖太上靈寳諸天内音自然玉字卷之三
